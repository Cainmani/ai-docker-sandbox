name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $errors = @()

          Get-ChildItem -Path "scripts/*.ps1" | ForEach-Object {
            Write-Host "Checking: $($_.Name)"
            try {
              $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$null)
              Write-Host "  ✓ Syntax OK" -ForegroundColor Green
            } catch {
              Write-Host "  ✗ Syntax Error: $($_.Exception.Message)" -ForegroundColor Red
              $errors += $_.FullName
            }
          }

          if ($errors.Count -gt 0) {
            Write-Error "Syntax errors found in: $($errors -join ', ')"
            exit 1
          }

      - name: Validate Dockerfile
        shell: bash
        run: |
          echo "Checking Dockerfile syntax..."
          if docker build --check -f docker/Dockerfile docker/ 2>/dev/null; then
            echo "✓ Dockerfile syntax OK"
          else
            # --check not available in all Docker versions, try basic validation
            if grep -q "^FROM" docker/Dockerfile; then
              echo "✓ Dockerfile has FROM instruction"
            else
              echo "✗ Dockerfile missing FROM instruction"
              exit 1
            fi
          fi

      - name: Check for common issues
        shell: pwsh
        run: |
          $issues = @()

          # Check for hardcoded paths that might not work on other systems
          $files = Get-ChildItem -Path "scripts/*.ps1" -Recurse
          foreach ($file in $files) {
            $content = Get-Content $file.FullName -Raw
            if ($content -match 'C:\\Users\\[^$]') {
              $issues += "$($file.Name): Contains hardcoded user path"
            }
          }

          # Check for TODO/FIXME comments
          $todoCount = (Get-ChildItem -Path "scripts/*.ps1" | Select-String -Pattern "TODO|FIXME" -AllMatches).Matches.Count
          if ($todoCount -gt 0) {
            Write-Host "Note: Found $todoCount TODO/FIXME comments" -ForegroundColor Yellow
          }

          if ($issues.Count -gt 0) {
            Write-Warning "Issues found:"
            $issues | ForEach-Object { Write-Warning "  - $_" }
          }

          Write-Host "Validation complete"

  check-pinned-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Check pinned package versions
        shell: bash
        run: |
          echo "Checking pinned package versions against registries..."
          echo ""
          stale=0

          # Extract pinned versions from install_cli_tools.sh
          SCRIPT="docker/install_cli_tools.sh"

          check_npm() {
            local pkg="$1"
            local pinned="$2"
            local latest
            latest=$(npm view "$pkg" version 2>/dev/null || echo "unknown")
            if [ "$latest" = "unknown" ]; then
              echo "⚠ $pkg: could not query registry (pinned: $pinned)"
            elif [ "$pinned" = "$latest" ]; then
              echo "✓ $pkg: $pinned (up to date)"
            else
              echo "⚠ $pkg: pinned $pinned → latest $latest (UPDATE AVAILABLE)"
              stale=$((stale + 1))
            fi
          }

          check_pip() {
            local pkg="$1"
            local pinned="$2"
            local latest
            latest=$(pip3 index versions "$pkg" 2>/dev/null | grep -oP 'LATEST:\s+\K[0-9.]+' || echo "unknown")
            if [ "$latest" = "unknown" ]; then
              # Fallback: try pip install with impossible version to get available versions
              latest=$(pip3 install "${pkg}==0.0.0.0.0" 2>&1 | grep -oP '\(from versions: .*\)' | grep -oP '[0-9.]+' | tail -1 || echo "unknown")
            fi
            if [ "$latest" = "unknown" ]; then
              echo "⚠ $pkg: could not query registry (pinned: $pinned)"
            elif [ "$pinned" = "$latest" ]; then
              echo "✓ $pkg (pip): $pinned (up to date)"
            else
              echo "⚠ $pkg (pip): pinned $pinned → latest $latest (UPDATE AVAILABLE)"
              stale=$((stale + 1))
            fi
          }

          # Parse pinned versions from the script
          gemini_ver=$(grep -oP '@google/gemini-cli@\K[0-9.]+' "$SCRIPT" | head -1)
          codex_ver=$(grep -oP '@openai/codex@\K[0-9.]+' "$SCRIPT" | head -1)
          vibe_ver=$(grep -oP 'vibe-kanban@\K[0-9.]+' "$SCRIPT" | head -1)
          openai_ver=$(grep -oP 'openai==\K[0-9.]+' "$SCRIPT" | head -1)

          echo "Pinned versions found in $SCRIPT:"
          echo "  @google/gemini-cli: ${gemini_ver:-NOT FOUND}"
          echo "  @openai/codex: ${codex_ver:-NOT FOUND}"
          echo "  vibe-kanban: ${vibe_ver:-NOT FOUND}"
          echo "  openai (pip): ${openai_ver:-NOT FOUND}"
          echo ""

          # Check each against registry
          [ -n "$gemini_ver" ] && check_npm "@google/gemini-cli" "$gemini_ver"
          [ -n "$codex_ver" ] && check_npm "@openai/codex" "$codex_ver"
          [ -n "$vibe_ver" ] && check_npm "vibe-kanban" "$vibe_ver"
          [ -n "$openai_ver" ] && check_pip "openai" "$openai_ver"

          echo ""
          if [ "$stale" -gt 0 ]; then
            echo "::warning::$stale pinned package(s) have newer versions available. Update versions in docker/install_cli_tools.sh."
          else
            echo "All pinned packages are up to date."
          fi
